version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - bodyclose
  settings:
    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - nilValReturn
        - sloppyReassign
        - truncateCmp
        - weakCond
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
      - path: pb/
        linters:
          - all
