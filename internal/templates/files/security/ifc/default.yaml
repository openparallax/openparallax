# Information Flow Control — Default Policy
#
# Balanced stance: blocks credential and security data from leaving the
# machine (HTTP, email, messages) and from being executed as shell commands.
# Allows workspace reads, writes, and memory operations for all levels
# except critical (hard-blocked everywhere).
#
# See docs/security/ifc.md for the full schema reference.

mode: enforce

# Source classification rules. First match wins, evaluated top to bottom.
# Each rule assigns a sensitivity level to data based on file path.
sources:
  - name: ssh_keys
    sensitivity: critical
    match:
      basename_in: [id_rsa, id_ed25519, id_ecdsa, id_dsa]
      path_contains: ["/.ssh/"]

  - name: env_files
    sensitivity: critical
    match:
      basename_in: [".env", ".env.local", ".env.production", ".env.staging"]
      basename_not_in: [".env.example", ".env.template", ".env.sample", ".env.dist"]

  - name: credential_files
    sensitivity: critical
    match:
      basename_in: [credentials, credentials.json, token.json, secrets, secrets.yaml, secrets.yml, secrets.json, service-account.json, keyfile.json, ".netrc", ".pgpass", ".my.cnf"]

  - name: credential_extensions
    sensitivity: critical
    match:
      basename_suffix_in: [".pem", ".key", ".p12", ".pfx", ".ppk"]

  - name: cloud_config_dirs
    sensitivity: critical
    match:
      path_contains: ["/.aws/", "/.kube/", "/.docker/", "/.gnupg/", "/.azure/", "/.password-store/"]

  - name: system_security
    sensitivity: critical
    match:
      path_in: ["/etc/shadow", "/etc/sudoers", "/root"]

  - name: openparallax_internals
    sensitivity: critical
    match:
      path_contains: ["/.openparallax/"]
      basename_in: [canary.token, audit.jsonl, openparallax.db]

  - name: financial_documents
    sensitivity: restricted
    match:
      basename_contains: [tax, invoice, salary, payslip, bank-statement, ssn, passport]

  - name: workspace_config
    sensitivity: confidential
    match:
      basename_in: [config.yaml, soul.md, identity.md]

  - name: default
    sensitivity: public
    match: {}

# Sink categories. Each action type belongs to exactly one category.
sinks:
  external:
    - http_request
    - send_email
    - send_message
  exec:
    - execute_command
  workspace_write:
    - write_file
    - memory_write
    - create_directory
    - move_file
    - copy_file
    - delete_file
  workspace_read:
    - read_file
    - list_directory
    - search_files
    - memory_search
    - grep_files

# Decision matrix. For each sensitivity level × sink category: allow, block, or escalate.
# escalate routes to Shield Tier 3 (human approval).
rules:
  public:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  internal:
    external: block
    exec: allow
    workspace_write: allow
    workspace_read: allow

  confidential:
    external: block
    exec: allow
    workspace_write: allow
    workspace_read: allow

  restricted:
    external: block
    exec: escalate
    workspace_write: escalate
    workspace_read: allow

  critical:
    external: block
    exec: block
    workspace_write: block
    workspace_read: block
