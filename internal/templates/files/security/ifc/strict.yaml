# Information Flow Control — Strict Policy
#
# Maximum data compartmentalization. Confidential data cannot be written to
# disk or sent externally. Restricted data is hard-blocked everywhere except
# reads. Critical data is blocked universally. Suitable for environments
# handling regulated data (healthcare, finance, legal) where data leakage
# across sensitivity boundaries is unacceptable.
#
# This policy will generate frequent escalations for normal development
# workflows. Use it when the cost of a false negative (data leak) far
# outweighs the cost of a false positive (blocked action).

mode: enforce

sources:
  - name: ssh_keys
    sensitivity: critical
    match:
      basename_in: [id_rsa, id_ed25519, id_ecdsa, id_dsa]
      path_contains: ["/.ssh/"]

  - name: env_files
    sensitivity: critical
    match:
      basename_in: [".env", ".env.local", ".env.production", ".env.staging"]
      basename_not_in: [".env.example", ".env.template", ".env.sample", ".env.dist"]

  - name: credential_files
    sensitivity: critical
    match:
      basename_in: [credentials, credentials.json, token.json, secrets, secrets.yaml, secrets.yml, secrets.json, service-account.json, keyfile.json, ".netrc", ".pgpass", ".my.cnf"]

  - name: credential_extensions
    sensitivity: critical
    match:
      basename_suffix_in: [".pem", ".key", ".p12", ".pfx", ".ppk"]

  - name: cloud_config_dirs
    sensitivity: critical
    match:
      path_contains: ["/.aws/", "/.kube/", "/.docker/", "/.gnupg/", "/.azure/", "/.password-store/"]

  - name: system_security
    sensitivity: critical
    match:
      path_in: ["/etc/shadow", "/etc/sudoers", "/root"]

  - name: openparallax_internals
    sensitivity: critical
    match:
      path_contains: ["/.openparallax/"]
      basename_in: [canary.token, audit.jsonl, openparallax.db]

  - name: financial_documents
    sensitivity: restricted
    match:
      basename_contains: [tax, invoice, salary, payslip, bank-statement, ssn, passport]

  - name: medical_records
    sensitivity: restricted
    match:
      basename_contains: [patient, diagnosis, prescription, medical, hipaa, phi]

  - name: legal_documents
    sensitivity: restricted
    match:
      basename_contains: [contract, nda, settlement, litigation, attorney, privileged]

  - name: workspace_config
    sensitivity: confidential
    match:
      basename_in: [config.yaml, soul.md, identity.md]

  - name: default
    sensitivity: public
    match: {}

sinks:
  external:
    - http_request
    - send_email
    - send_message
  exec:
    - execute_command
  workspace_write:
    - write_file
    - memory_write
    - create_directory
    - move_file
    - copy_file
    - delete_file
  workspace_read:
    - read_file
    - list_directory
    - search_files
    - memory_search
    - grep_files

rules:
  public:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  internal:
    external: block
    exec: allow
    workspace_write: allow
    workspace_read: allow

  confidential:
    external: block
    exec: block
    workspace_write: escalate
    workspace_read: allow

  restricted:
    external: block
    exec: block
    workspace_write: block
    workspace_read: allow

  critical:
    external: block
    exec: block
    workspace_write: block
    workspace_read: block
