# Information Flow Control — Permissive Policy
#
# Minimal friction. Only critical-level data (credentials, SSH keys, cloud
# config) is blocked. Everything else flows freely. Suitable for trusted
# single-user workstations where the user is the only operator and the
# primary goal is productivity, not data compartmentalization.
#
# Shield still evaluates every action through its 4-tier pipeline regardless
# of IFC policy. Permissive IFC does not reduce Shield's effectiveness —
# it only loosens the data-flow constraints.

mode: enforce

sources:
  - name: ssh_keys
    sensitivity: critical
    match:
      basename_in: [id_rsa, id_ed25519, id_ecdsa, id_dsa]
      path_contains: ["/.ssh/"]

  - name: env_files
    sensitivity: critical
    match:
      basename_in: [".env", ".env.local", ".env.production", ".env.staging"]
      basename_not_in: [".env.example", ".env.template", ".env.sample", ".env.dist"]

  - name: credential_files
    sensitivity: critical
    match:
      basename_in: [credentials, credentials.json, token.json, secrets, secrets.yaml, secrets.yml, secrets.json, service-account.json, keyfile.json, ".netrc", ".pgpass", ".my.cnf"]

  - name: credential_extensions
    sensitivity: critical
    match:
      basename_suffix_in: [".pem", ".key", ".p12", ".pfx", ".ppk"]

  - name: cloud_config_dirs
    sensitivity: critical
    match:
      path_contains: ["/.aws/", "/.kube/", "/.docker/", "/.gnupg/", "/.azure/", "/.password-store/"]

  - name: system_security
    sensitivity: critical
    match:
      path_in: ["/etc/shadow", "/etc/sudoers", "/root"]

  - name: openparallax_internals
    sensitivity: critical
    match:
      path_contains: ["/.openparallax/"]
      basename_in: [canary.token, audit.jsonl, openparallax.db]

  - name: default
    sensitivity: public
    match: {}

sinks:
  external:
    - http_request
    - send_email
    - send_message
  exec:
    - execute_command
  workspace_write:
    - write_file
    - memory_write
    - create_directory
    - move_file
    - copy_file
    - delete_file
  workspace_read:
    - read_file
    - list_directory
    - search_files
    - memory_search
    - grep_files

rules:
  public:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  internal:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  confidential:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  restricted:
    external: allow
    exec: allow
    workspace_write: allow
    workspace_read: allow

  critical:
    external: block
    exec: block
    workspace_write: block
    workspace_read: block
