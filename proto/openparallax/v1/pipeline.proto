syntax = "proto3";
package openparallax.v1;
option go_package = "github.com/openparallax/openparallax/internal/types/pb";

import "openparallax/v1/types.proto";

// AgentService handles the bidirectional stream between the sandboxed Agent
// process and the Engine. The Agent calls the LLM and proposes tool calls;
// the Engine evaluates them through Shield and executes allowed tools.
service AgentService {
  // RunSession establishes a persistent bidirectional stream for the Agent's
  // lifetime. The Engine sends directives (process a message, deliver tool
  // results, shut down). The Agent sends events (tokens, tool proposals,
  // response completions).
  rpc RunSession(stream AgentEvent) returns (stream EngineDirective);
}

// ClientService handles external client connections (TUI, Web UI via gRPC,
// channel adapters). Clients send messages and receive streamed pipeline events.
service ClientService {
  // SendMessage submits a user message and streams back pipeline events.
  rpc SendMessage(ClientMessageRequest) returns (stream PipelineEvent);

  // ResolveApproval responds to a Tier 3 approval request.
  rpc ResolveApproval(ApprovalResponse) returns (ApprovalAck);

  // GetStatus returns engine and agent status.
  rpc GetStatus(StatusRequest) returns (StatusResponse);

  // ListSessions returns available sessions.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // GetHistory returns conversation history for a session.
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);

  // Shutdown initiates graceful shutdown.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// SubAgentService handles sub-agent process communication. Sub-agents follow
// the same pattern as the main agent: sandboxed, call LLM, propose tools.
service SubAgentService {
  // RegisterSubAgent authenticates a sub-agent process and returns its task.
  rpc RegisterSubAgent(SubAgentRegisterRequest) returns (SubAgentRegisterResponse);

  // SubAgentExecuteTool forwards a tool call from a sub-agent to the engine.
  rpc SubAgentExecuteTool(SubAgentToolRequest) returns (SubAgentToolResponse);

  // SubAgentComplete reports that a sub-agent has finished its task.
  rpc SubAgentComplete(SubAgentCompleteRequest) returns (SubAgentCompleteResponse);

  // SubAgentFailed reports that a sub-agent encountered an error.
  rpc SubAgentFailed(SubAgentFailedRequest) returns (SubAgentFailedResponse);

  // SubAgentPollMessage checks for a pending follow-up message from the main agent.
  rpc SubAgentPollMessage(SubAgentPollRequest) returns (SubAgentPollResponse);
}

// --- AgentService messages ---

// EngineDirective is a command from the Engine to the Agent.
message EngineDirective {
  oneof directive {
    ProcessRequest process = 1;
    ToolResultDelivery tool_result = 2;
    ToolDefsDelivery tool_defs = 3;
    ShutdownDirective shutdown = 4;
  }
}

// ProcessRequest tells the Agent to process a user message.
message ProcessRequest {
  string session_id = 1;
  string message_id = 2;
  string content = 3;
  SessionMode mode = 4;
  string source = 5;
}

// ToolResultDelivery delivers the result of a tool the Agent proposed.
message ToolResultDelivery {
  string call_id = 1;
  string content = 2;
  bool is_error = 3;
}

// ToolDefsDelivery sends available tool definitions to the Agent.
message ToolDefsDelivery {
  repeated ToolDef tools = 1;
}

// ToolDef describes a single tool available to the Agent.
message ToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
  string group = 4;
}

// ShutdownDirective tells the Agent to shut down gracefully.
message ShutdownDirective {
  string reason = 1;
}

// AgentEvent is an event from the Agent to the Engine.
message AgentEvent {
  oneof event {
    AgentReady ready = 1;
    LLMTokenEmitted llm_token_emitted = 2;
    ToolCallProposed tool_proposal = 3;
    ToolDefsRequest tool_defs_request = 4;
    MemoryFlush memory_flush = 5;
    AgentResponseComplete response_complete = 6;
    AgentError agent_error = 7;
  }
}

// AgentReady signals the Agent is initialized and waiting for directives.
message AgentReady {
  string agent_id = 1;
  // sandbox_canary_json carries the JSON-encoded sandbox.CanaryResult
  // from the agent's startup verification probes. The engine emits an
  // audit entry on receipt; empty string means the agent did not run
  // canary verification.
  string sandbox_canary_json = 2;
}

// LLMTokenEmitted carries a single streaming token from the LLM.
message LLMTokenEmitted {
  string session_id = 1;
  string message_id = 2;
  string text = 3;
}

// ToolCallProposed signals the LLM wants to call a tool.
message ToolCallProposed {
  string session_id = 1;
  string message_id = 2;
  string call_id = 3;
  string tool_name = 4;
  string arguments_json = 5;
}

// ToolDefsRequest asks the Engine for available tool definitions.
message ToolDefsRequest {
  repeated string groups = 1;
}

// MemoryFlush sends compaction facts for the Engine to persist.
message MemoryFlush {
  string content = 1;
}

// AgentResponseComplete signals the Agent has finished processing a message.
message AgentResponseComplete {
  string session_id = 1;
  string message_id = 2;
  string content = 3;
  repeated Thought thoughts = 4;
  TokenUsage usage = 5;
}

// Thought records a reasoning step or tool call during processing.
message Thought {
  string stage = 1;
  string summary = 2;
  string detail_json = 3;
}

// TokenUsage tracks LLM token consumption for a single message.
message TokenUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 cache_read_tokens = 3;
  int32 cache_write_tokens = 4;
}

// AgentError reports an error during Agent processing.
message AgentError {
  string session_id = 1;
  string message_id = 2;
  string code = 3;
  string message = 4;
  bool recoverable = 5;
}

// --- ClientService messages ---

// ClientMessageRequest is a user message from a connected client.
message ClientMessageRequest {
  string content = 1;
  string session_id = 2;
  SessionMode mode = 3;
  string source = 4;
}

// ListSessionsRequest asks for available sessions.
message ListSessionsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

// ListSessionsResponse returns available sessions.
message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

// SessionInfo is a summary of a session.
message SessionInfo {
  string id = 1;
  string title = 2;
  SessionMode mode = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  int32 message_count = 6;
}

// GetHistoryRequest asks for conversation history.
message GetHistoryRequest {
  string session_id = 1;
  int32 limit = 2;
}

// GetHistoryResponse returns conversation messages.
message GetHistoryResponse {
  repeated ChatMessage messages = 1;
}

// ChatMessage is a single message in a conversation.
message ChatMessage {
  string id = 1;
  string session_id = 2;
  string role = 3;
  string content = 4;
  int64 timestamp = 5;
}

// --- Legacy compatibility ---

// ProcessMessageRequest is kept for backward compatibility during migration.
message ProcessMessageRequest {
  string content = 1;
  string session_id = 2;
  string message_id = 3;
  SessionMode mode = 4;
  string source = 5;
}

// PipelineEvent is streamed back to the caller during pipeline execution.
message PipelineEvent {
  string session_id = 1;
  string message_id = 2;
  PipelineEventType event_type = 3;

  IntentParsed intent_parsed = 10;
  ActionsPlanned actions_planned = 11;
  SelfEvalResult self_eval_result = 12;
  ShieldVerdict shield_verdict = 13;
  ActionStarted action_started = 14;
  ActionCompleted action_completed = 15;
  reserved 16;
  LLMToken llm_token = 17;
  ResponseComplete response_complete = 18;
  ApprovalNeeded approval_needed = 19;
  OTRBlocked otr_blocked = 20;
  PipelineError pipeline_error = 21;
}

// PipelineEventType identifies the event category.
enum PipelineEventType {
  PIPELINE_EVENT_UNSPECIFIED = 0;
  INTENT_PARSED = 1;
  ACTIONS_PLANNED = 2;
  SELF_EVAL_PASSED = 3;
  SHIELD_VERDICT = 4;
  ACTION_STARTED = 5;
  ACTION_COMPLETED = 6;
  reserved 7;
  LLM_TOKEN = 8;
  COMPOSING = 9;
  RESPONSE_COMPLETE = 10;
  APPROVAL_NEEDED = 11;
  OTR_BLOCKED = 12;
  ERROR = 13;
  SUB_AGENT_SPAWNED = 14;
  SUB_AGENT_PROGRESS = 15;
  SUB_AGENT_COMPLETED = 16;
  SUB_AGENT_FAILED = 17;
  SUB_AGENT_CANCELLED = 18;
}

// IntentParsed is emitted when intent parsing completes.
message IntentParsed {
  GoalType goal = 1;
  ActionType primary_action = 2;
  double confidence = 3;
  bool destructive = 4;
}

// ActionsPlanned is emitted when the agent finishes planning actions.
message ActionsPlanned {
  repeated ActionType actions = 1;
  int32 count = 2;
}

// SelfEvalResult is emitted after Layer 0 self-check.
message SelfEvalResult {
  bool passed = 1;
  string reason = 2;
}

// ShieldVerdict is emitted after Shield evaluation.
message ShieldVerdict {
  VerdictDecision decision = 1;
  int32 tier = 2;
  double confidence = 3;
  string reasoning = 4;
  ActionType action_type = 5;
}

// ActionStarted is emitted when an action begins execution.
message ActionStarted {
  ActionType action_type = 1;
  string summary = 2;
}

// ActionCompleted is emitted when an action finishes execution.
message ActionCompleted {
  ActionType action_type = 1;
  bool success = 2;
  string summary = 3;
}

// LLMToken carries a single streaming token from the LLM.
message LLMToken {
  string text = 1;
}

// ResponseComplete carries the full final response text.
message ResponseComplete {
  string content = 1;
}

// ApprovalNeeded is emitted when Tier 3 human approval is required.
message ApprovalNeeded {
  string approval_id = 1;
  ActionRequest action = 2;
  Verdict shield_assessment = 3;
  string context_summary = 4;
  int64 timeout_at = 5;
}

// OTRBlocked is emitted when an action is blocked in OTR mode.
message OTRBlocked {
  ActionType action_type = 1;
  string reason = 2;
}

// PipelineError is emitted when a pipeline stage fails.
message PipelineError {
  string code = 1;
  string message = 2;
  bool recoverable = 3;
}

// ApprovalResponse carries the user's approval decision.
message ApprovalResponse {
  string approval_id = 1;
  string session_id = 2;
  bool approved = 3;
}

// ApprovalAck confirms receipt of an approval response.
message ApprovalAck {
  bool received = 1;
}

// MemoryReadRequest asks for a specific memory file.
message MemoryReadRequest {
  string file_type = 1;
}

// MemoryReadResponse returns the content of a memory file.
message MemoryReadResponse {
  string content = 1;
  string path = 2;
}

// MemorySearchRequest performs FTS5 search across memory.
message MemorySearchRequest {
  string query = 1;
  int32 limit = 2;
}

// MemorySearchResponse returns FTS5 search results.
message MemorySearchResponse {
  repeated MemorySearchResult results = 1;
}

// MemorySearchResult is a single FTS5 search hit.
message MemorySearchResult {
  string path = 1;
  string section = 2;
  string snippet = 3;
  double score = 4;
}

// StatusRequest asks for agent status.
message StatusRequest {}

// StatusResponse returns agent status.
message StatusResponse {
  string agent_name = 1;
  string model = 2;
  bool shield_connected = 3;
  int32 shield_max_tier = 4;
  int64 uptime_seconds = 5;
  int32 session_count = 6;
  int32 actions_today = 7;
}

// ShutdownRequest initiates graceful shutdown.
message ShutdownRequest {}

// ShutdownResponse confirms shutdown status.
message ShutdownResponse {
  bool clean = 1;
}

// --- Sub-agent messages ---

// SubAgentRegisterRequest authenticates a sub-agent process.
message SubAgentRegisterRequest {
  string token = 1;
}

// SubAgentToolDef describes a tool available to the sub-agent.
message SubAgentToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

// SubAgentRegisterResponse returns the sub-agent's task assignment.
message SubAgentRegisterResponse {
  string name = 1;
  string task = 2;
  repeated SubAgentToolDef tools = 3;
  string system_prompt = 4;
  string model = 5;
  string provider = 6;
  string api_key_env = 7;
  string base_url = 8;
  int32 max_llm_calls = 9;
}

// SubAgentToolRequest forwards a tool call from a sub-agent to the engine.
message SubAgentToolRequest {
  string name = 1;
  string call_id = 2;
  string tool_name = 3;
  string arguments_json = 4;
  string session_id = 5;
}

// SubAgentToolResponse returns the tool execution result.
message SubAgentToolResponse {
  string content = 1;
  bool is_error = 2;
}

// SubAgentCompleteRequest reports task completion.
message SubAgentCompleteRequest {
  string name = 1;
  string result = 2;
}

// SubAgentCompleteResponse acknowledges completion.
message SubAgentCompleteResponse {}

// SubAgentFailedRequest reports task failure.
message SubAgentFailedRequest {
  string name = 1;
  string error = 2;
}

// SubAgentFailedResponse acknowledges failure.
message SubAgentFailedResponse {}

// SubAgentPollRequest asks whether the main agent has sent a follow-up message.
message SubAgentPollRequest {
  string name = 1;
}

// SubAgentPollResponse returns a pending message if one exists.
message SubAgentPollResponse {
  bool has_message = 1;
  string content = 2;
}
