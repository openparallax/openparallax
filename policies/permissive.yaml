# Permissive policy: Minimal friction.
# Approves most operations without evaluation. Only evaluates external
# communication and blocks critical system paths. Suitable for trusted
# development environments.

deny:
  - name: block_critical_system_paths
    action_types:
      - read_file
      - write_file
      - delete_file
    paths:
      - "~/.ssh/id_*"
      - "~/.ssh/authorized_keys"
      - "~/.aws/credentials"
      - "~/.gnupg/**"
      - "/etc/shadow"
      - "C:\\Windows\\System32\\config\\**"

verify:
  - name: evaluate_external_sends
    action_types:
      - send_message
      - send_email
    tier_override: 1

  - name: evaluate_outbound_http
    action_types:
      - http_request
    tier_override: 1

allow:
  - name: allow_all_file_ops
    action_types:
      - read_file
      - write_file
      - delete_file
      - move_file
      - copy_file
      - create_directory
      - list_directory
      - search_files

  - name: allow_shell
    action_types:
      - execute_command

  - name: allow_memory
    action_types:
      - memory_write
      - memory_search

  - name: allow_git
    action_types:
      - git_status
      - git_diff
      - git_commit
      - git_push
      - git_pull
      - git_log
      - git_branch
      - git_checkout

  - name: allow_browser
    action_types:
      - browser_navigate
      - browser_click
      - browser_type
      - browser_extract
      - browser_screenshot

  - name: allow_schedules
    action_types:
      - create_schedule
      - delete_schedule
      - list_schedules

  - name: allow_calendar
    action_types:
      - read_calendar
      - create_event
      - update_event
      - delete_event

  - name: allow_canvas
    action_types:
      - canvas_create
      - canvas_update
