name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # cosign keyless signing + OIDC trusted publishing

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Go tests
        run: go test -race -count=1 ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Frontend tests
        run: cd web && npm test

      - name: E2E tests (mock)
        env:
          CGO_ENABLED: "0"
          E2E_LLM: mock
        run: |
          go build -o dist/openparallax ./cmd/agent
          go test -tags e2e -count=1 -timeout 300s ./e2e/...

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: cd web && npm ci

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python:
    name: Publish Python (${{ matrix.package }})
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [shield, audit, memory, sandbox, channels]
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" wrappers/python/${{ matrix.package }}/pyproject.toml

      - name: Build package
        run: cd wrappers/python/${{ matrix.package }} && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wrappers/python/${{ matrix.package }}/dist/
          skip-existing: true

  publish-node:
    name: Publish Node.js (${{ matrix.package }})
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [shield, audit, memory, sandbox, channels]
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd wrappers/node/${{ matrix.package }}
          npm version "${VERSION}" --no-git-tag-version

      - name: Install and build
        run: cd wrappers/node/${{ matrix.package }} && npm install --ignore-scripts && npm run build

      - name: Publish to npm with provenance
        run: |
          cd wrappers/node/${{ matrix.package }}
          OUTPUT=$(npm publish --access public --provenance 2>&1) && exit 0
          if echo "$OUTPUT" | grep -q "previously published"; then
            echo "Version already published — skipping."
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.OP_NPM_TOKEN }}
