name: Release Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build bridge binaries
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          mkdir -p dist

          for cmd in shield-bridge audit-bridge memory-bridge sandbox-bridge channels-bridge; do
            go build -trimpath -ldflags="-s -w" \
              -o "dist/${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
              "./cmd/${cmd}"
          done

          go build -trimpath -ldflags="-s -w" \
            -o "dist/openparallax-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/agent

          go build -trimpath -ldflags="-s -w" \
            -o "dist/openparallax-shield-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/shield

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Go tests
        run: go test -race -count=1 ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Frontend tests
        run: cd web && npm ci && npm test
